sft:
  model:
    name: "Qwen/Qwen2.5-1.5B-Instruct"  # Non-quantized for standard peft path (no unsloth)
    max_seq_length: 512
    dtype: "float16"  # NEVER bfloat16 — RTX 3500 Ada uses float16
    load_in_4bit: true

  lora:
    r: 8
    lora_alpha: 16
    lora_dropout: 0.05
    target_modules:
      - q_proj
      - k_proj
      - v_proj
      - o_proj
    bias: "none"
    use_gradient_checkpointing: "unsloth"

  training:
    num_train_epochs: 1
    per_device_train_batch_size: 2
    gradient_accumulation_steps: 2
    warmup_steps: 2
    max_steps: 10            # Hard cap for local smoke run
    learning_rate: 2.0e-4
    weight_decay: 0.01
    lr_scheduler_type: "cosine"
    fp16: false  # disabled: bnb 4-bit compute_dtype handles efficiency; AMP fp16 conflicts with bnb bfloat16 tensors
    seed: 42
    logging_steps: 1
    save_steps: 10
    dataloader_num_workers: 0
    output_dir: "./outputs/sft_local_test"

  dataset:
    train_path: "data/processed/manthan_dataset"  # Local disk dataset
    text_field: "text"
    max_samples: null

  hub:
    push_to_hub: false          # No Hub push for local test
    hub_model_id: "shahansha/Manthan-1.5B-sft-v0.1"

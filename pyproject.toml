[tool.ruff]
target-version = "py310"
line-length = 100
select = ["E", "F", "W", "I", "UP"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
timeout = 30
markers = [
	"integration: tests that call external services or load remote models",
	"huggingface: tests that download artifacts from the Hugging Face Hub",
]
